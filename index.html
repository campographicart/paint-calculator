<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Ratio Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0ede8; color: #1a1714; font-family: Arial, Helvetica, sans-serif; padding: 20px 14px; }

.hdr { border-top: 4px solid #1a1714; border-bottom: 1px solid #c8c0b4; padding: 14px 0 10px; margin-bottom: 24px; }
.hdr h1 { font-size: 1.7rem; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; }
.hdr p { font-size: 0.65rem; color: #6b6560; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

.lbl { font-size: 0.6rem; color: #6b6560; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-family: Courier, monospace; }
.sec { margin-bottom: 22px; }

/* COLOR ROWS */
.color-row { display: flex; align-items: center; gap: 12px; background: #e8e3dc; border: 1px solid #c8c0b4; padding: 10px 12px; margin-bottom: 8px; }
.swatch { width: 38px; height: 38px; border-radius: 3px; border: 1px solid #c8c0b4; flex-shrink: 0; cursor: pointer; padding: 0; background: none; overflow: hidden; position: relative; }
.swatch input[type=color] { position: absolute; top: -6px; left: -6px; width: calc(100% + 12px); height: calc(100% + 12px); border: none; cursor: pointer; }
.cname { flex: 1; font-family: Arial, sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; background: none; border: none; outline: none; color: #1a1714; min-width: 0; }
.cname::placeholder { color: #c8c0b4; font-weight: 400; }
.rmbtn { background: none; border: none; color: #c8c0b4; font-size: 1.4rem; padding: 4px 8px; cursor: pointer; flex-shrink: 0; line-height: 1; }

.addbtn { width: 100%; padding: 13px; background: none; border: 1px solid #2c7873; color: #2c7873; font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; margin-bottom: 0; }

/* STEPS */
.steps-box { border: 1px solid #c8c0b4; background: #e8e3dc; }
.steps-hdr { display: flex; border-bottom: 2px solid #1a1714; padding: 6px 10px; gap: 0; }
.steps-hdr span { font-size: 0.55rem; color: #6b6560; letter-spacing: 0.1em; text-transform: uppercase; font-family: Courier, monospace; }
.steps-hdr .sh-num { width: 40px; flex-shrink: 0; }
.steps-hdr .sh-col { flex: 1; }
.steps-hdr .sh-g { width: 90px; text-align: right; }
.steps-hdr .sh-r { width: 90px; text-align: right; }
.steps-hdr .sh-n { flex: 1; }
.steps-hdr .sh-d { width: 40px; }

.step-row { display: flex; align-items: stretch; border-bottom: 1px solid #c8c0b4; }
.s-num { width: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: Courier, monospace; font-size: 0.65rem; color: #6b6560; }
.s-sel { flex: 1; font-family: Arial, sans-serif; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; background: none; border: none; border-left: 1px solid #c8c0b4; outline: none; color: #1a1714; padding: 10px 8px; cursor: pointer; }
.s-g { width: 90px; font-family: Courier, monospace; font-size: 0.85rem; background: none; border: none; border-left: 1px solid #c8c0b4; outline: none; color: #1a1714; padding: 10px 8px; text-align: right; }
.s-g::placeholder { color: #c8c0b4; }
.s-r { width: 90px; font-family: Courier, monospace; font-size: 0.8rem; color: #6b6560; border-left: 1px solid #c8c0b4; padding: 10px 8px; text-align: right; display: flex; align-items: center; justify-content: flex-end; }
.s-n { flex: 1; font-family: Courier, monospace; font-size: 0.75rem; font-style: italic; background: none; border: none; border-left: 1px solid #c8c0b4; outline: none; color: #6b6560; padding: 10px 8px; }
.s-d { width: 40px; flex-shrink: 0; background: none; border: none; border-left: 1px solid #c8c0b4; color: #c8c0b4; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.stepbtn { width: 100%; background: none; border: none; padding: 12px 14px; font-family: Courier, monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6b6560; cursor: pointer; text-align: left; }

/* RESULTS */
.results { background: #1a1714; color: #f0ede8; padding: 20px; margin-bottom: 22px; }
.res-top { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.res-top h2 { font-size: 1.1rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
.res-tag { font-family: Courier, monospace; font-size: 0.6rem; color: rgba(240,237,232,0.4); letter-spacing: 0.08em; text-transform: uppercase; }
.tot-badge { font-family: Courier, monospace; font-size: 0.65rem; color: rgba(240,237,232,0.5); white-space: nowrap; }

.ratio-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.rdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rname { flex: 1; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; }
.rpct { font-family: Courier, monospace; font-size: 0.9rem; width: 60px; text-align: right; }
.rgrams { font-family: Courier, monospace; font-size: 0.75rem; color: rgba(240,237,232,0.4); width: 60px; text-align: right; }
.bar-wrap { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; margin-top: -3px; }
.bar-sp { width: 10px; flex-shrink: 0; }
.bar-track { flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; }
.bar-fill { height: 100%; border-radius: 2px; }
.empty-st { font-family: Courier, monospace; font-size: 0.65rem; color: rgba(240,237,232,0.3); letter-spacing: 0.1em; text-transform: uppercase; text-align: center; padding: 20px; }

.scale-sec { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; margin-top: 4px; }
.scale-lbl { font-family: Courier, monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(240,237,232,0.4); margin-bottom: 8px; }
.scale-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.scale-in { font-family: Courier, monospace; font-size: 1.1rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #f0ede8; padding: 8px 12px; width: 110px; outline: none; text-align: right; }
.unit-row { display: flex; border: 1px solid rgba(255,255,255,0.15); }
.ubtn { font-family: Courier, monospace; font-size: 0.65rem; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(255,255,255,0.05); color: rgba(240,237,232,0.4); border: none; border-right: 1px solid rgba(255,255,255,0.1); padding: 8px 10px; cursor: pointer; }
.ubtn:last-child { border-right: none; }
.ubtn.on { background: rgba(255,255,255,0.18); color: #f0ede8; }
.scaled-hdr { font-family: Courier, monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(240,237,232,0.35); margin: 12px 0 8px; }
.sc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.sc-val { font-family: Courier, monospace; font-size: 1rem; font-weight: 700; margin-left: auto; }
.unit-note { font-family: Courier, monospace; font-size: 0.55rem; color: rgba(240,237,232,0.3); font-style: italic; margin-top: 8px; }

/* RECIPES */
.rec-panel { border: 1px solid #c8c0b4; background: #e8e3dc; margin-bottom: 22px; }
.rec-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #c8c0b4; }
.rec-count { font-family: Courier, monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6b6560; }
.rec-item { display: flex; align-items: center; border-bottom: 1px solid #c8c0b4; cursor: pointer; }
.rec-item:last-child { border-bottom: none; }
.rec-info { flex: 1; display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.rec-dots { display: flex; gap: 3px; }
.rec-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
.rec-name { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; color: #1a1714; }
.rec-meta { font-family: Courier, monospace; font-size: 0.6rem; color: #6b6560; white-space: nowrap; }
.rec-del { background: none; border: none; border-left: 1px solid #c8c0b4; color: #c8c0b4; font-size: 1.1rem; padding: 0 16px; cursor: pointer; align-self: stretch; display: flex; align-items: center; }
.rec-empty { font-family: Courier, monospace; font-size: 0.65rem; color: #6b6560; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; padding: 20px; }

/* CONTROLS */
.ctrl { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.btn { font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: 1px solid #c8c0b4; background: #e8e3dc; color: #1a1714; padding: 10px 18px; cursor: pointer; }
.btn-teal { border-color: #2c7873; color: #2c7873; }
.btn-red { border-color: #c0392b; color: #c0392b; }

/* MODAL */
.modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26,23,20,0.65); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box { background: #f0ede8; border: 2px solid #1a1714; padding: 24px; width: 300px; max-width: 90vw; }
.modal-box h3 { font-size: 1rem; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
.modal-in { font-family: Arial, sans-serif; font-size: 1rem; font-weight: 700; text-transform: uppercase; width: 100%; background: #e8e3dc; border: 1px solid #c8c0b4; color: #1a1714; padding: 10px 12px; outline: none; margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

/* TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1714; color: #f0ede8; font-family: Courier, monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 20px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 200; white-space: nowrap; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width: 600px) {
  body { padding: 14px 10px; }
  .hdr h1 { font-size: 1.4rem; }
  .steps-hdr { display: none; }
  .step-row { flex-wrap: wrap; position: relative; padding-right: 44px; }
  .s-num { width: 100%; height: auto; padding: 6px 10px 2px; justify-content: flex-start; font-size: 0.55rem; border-bottom: none; }
  .s-sel { width: 100%; flex: none; border-left: none; border-top: 1px solid #c8c0b4; padding: 12px 10px; font-size: 1rem; }
  .s-g { width: 50%; flex: none; border-left: none; border-top: 1px solid #c8c0b4; padding: 12px 10px; font-size: 1rem; text-align: left; }
  .s-r { width: calc(50% - 0px); flex: none; border-top: 1px solid #c8c0b4; padding: 12px 10px; font-size: 0.85rem; justify-content: flex-end; }
  .s-n { display: none; }
  .s-d { position: absolute; right: 0; top: 0; bottom: 0; width: 44px; border-left: 1px solid #c8c0b4; height: 100%; }
  .addbtn { padding: 14px; font-size: 1rem; }
  .stepbtn { padding: 14px; }
  .scale-row { flex-direction: column; align-items: flex-start; }
  .ctrl { flex-direction: column; }
  .ctrl .btn { text-align: center; padding: 14px; }
  .rec-meta { display: none; }
}
</style>
</head>
<body>

<div id="dbg" style="background:#c0392b;color:white;padding:10px;font-family:monospace;font-size:12px;display:none;word-break:break-all;white-space:pre-wrap;position:fixed;top:0;left:0;right:0;z-index:9999;max-height:50vh;overflow:auto"></div>
<div class="hdr">
  <h1>Paint Ratio Calculator</h1>
  <p>Weight-Based Formula Tool</p>
</div>

<div class="sec">
  <div class="lbl">01 — Define Colors</div>
  <div id="colorList"><div style="padding:10px;background:red;color:white;font-size:16px">COLOR LIST LOADS</div></div>
  <button class="addbtn" id="addColorBtn">+ Add Color</button>
</div>

<div class="sec">
  <div class="lbl">02 — Log Additions</div>
  <div class="steps-box">
    <div class="steps-hdr">
      <span class="sh-num"></span>
      <span class="sh-col">Color</span>
      <span class="sh-g">Added (g)</span>
      <span class="sh-r">Running</span>
      <span class="sh-n">Note</span>
      <span class="sh-d"></span>
    </div>
    <div id="stepList"><div style="padding:10px;background:blue;color:white;font-size:16px">STEP LIST LOADS</div></div>
    <button class="stepbtn" id="addStepBtn">+ Add Step</button>
  </div>
</div>

<div class="results">
  <div class="res-top">
    <div>
      <h2>Formula Ratio <span class="res-tag" id="recTag"></span></h2>
    </div>
    <span class="tot-badge" id="totBadge">—</span>
  </div>
  <div id="ratioArea"><div class="empty-st">Add steps above to calculate ratio</div></div>
  <div class="scale-sec">
    <div class="scale-lbl">Scale to target batch</div>
    <div class="scale-row">
      <input type="number" class="scale-in" id="scaleIn" placeholder="500" min="0">
      <div class="unit-row">
        <button class="ubtn on" data-u="g">g</button>
        <button class="ubtn" data-u="oz">oz</button>
        <button class="ubtn" data-u="ml">ml</button>
        <button class="ubtn" data-u="floz">fl oz</button>
      </div>
    </div>
    <div id="scaledArea"></div>
  </div>
</div>

<div class="sec">
  <div class="lbl">03 — Saved Recipes</div>
  <div class="rec-panel">
    <div class="rec-head">
      <span class="rec-count" id="recCount">No saved recipes</span>
      <button class="btn btn-teal" id="saveBtn" style="padding:7px 12px;font-size:0.8rem">Save Current</button>
    </div>
    <div id="recList"></div>
  </div>
</div>

<div class="ctrl">
  <button class="btn" id="copyBtn">Copy Ratio</button>
  <button class="btn btn-red" id="resetBtn">Reset All</button>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <h3>Save Recipe</h3>
    <input class="modal-in" id="modalIn" type="text" placeholder="E.g. Warm White Base" maxlength="48">
    <div class="modal-btns">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn btn-teal" id="modalOk">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('dbg');
  d.style.display = 'block';
  d.textContent += 'ERROR: ' + msg + '\nLine: ' + line + '\n' + (err ? err.stack : '') + '\n\n';
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  var d = document.getElementById('dbg');
  d.style.display = 'block';
  d.textContent += 'PROMISE ERROR: ' + e.reason + '\n';
});
</script>
<script>
var PALETTE = ['#c0392b','#2c7873','#2c3e50','#e67e22','#8e44ad','#1abc9c'];
var UNITS = {
  g:    {label:'g',     factor:1,        dec:2, note:''},
  oz:   {label:'oz',    factor:0.035274, dec:3, note:'weight oz'},
  ml:   {label:'ml',    factor:1,        dec:2, note:'assumes 1g = 1ml (water-based)'},
  floz: {label:'fl oz', factor:0.033814, dec:3, note:'assumes 1g = 1ml'}
};

function uid() { return Math.random().toString(36).slice(2,9); }

var C = [
  {id:uid(), name:'Color A', hex:'#c0392b'},
  {id:uid(), name:'Color B', hex:'#2c7873'}
];
var S = [
  {id:uid(), colorId:C[0].id, grams:'', note:''},
  {id:uid(), colorId:C[1].id, grams:'', note:''}
];
var unit = 'g';
var activeRec = null;
var toastTmr;

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  clearTimeout(toastTmr);
  toastTmr = setTimeout(function(){ t.className = 'toast'; }, 2200);
}

function getTotals() {
  var T = {};
  C.forEach(function(c){ T[c.id]=0; });
  S.forEach(function(s){
    var g = parseFloat(s.grams)||0;
    if(T[s.colorId]!==undefined) T[s.colorId]+=g; else T[s.colorId]=g;
  });
  return T;
}

function drawColors() {
  var el = document.getElementById('colorList');
  el.innerHTML = '';
  C.forEach(function(c, ci) {
    var row = document.createElement('div');
    row.className = 'color-row';

    var sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = c.hex;
    var pk = document.createElement('input');
    pk.type = 'color';
    pk.value = c.hex;
    pk.addEventListener('input', function(){ c.hex=pk.value; sw.style.background=c.hex; refreshSelects(); drawResults(); });
    sw.appendChild(pk);

    var ni = document.createElement('input');
    ni.className = 'cname';
    ni.type = 'text';
    ni.value = c.name;
    ni.placeholder = 'Color name';
    ni.addEventListener('input', function(){ c.name=ni.value; refreshSelects(); drawResults(); });

    var rb = document.createElement('button');
    rb.className = 'rmbtn';
    rb.textContent = 'x';
    rb.addEventListener('click', function(){
      if(C.length<=1) return;
      var rid = c.id;
      C = C.filter(function(x){ return x.id!==rid; });
      S = S.map(function(s){ return s.colorId===rid ? {id:s.id,colorId:C[0].id,grams:s.grams,note:s.note} : s; });
      drawAll();
    });

    row.appendChild(sw); row.appendChild(ni); row.appendChild(rb);
    el.appendChild(row);
  });
}

function drawSteps() {
  var el = document.getElementById('stepList');
  el.innerHTML = '';
  var run = 0;
  S.forEach(function(s, si) {
    run += parseFloat(s.grams)||0;

    var row = document.createElement('div');
    row.className = 'step-row';

    var num = document.createElement('div');
    num.className = 's-num';
    num.textContent = String(si+1).padStart(2,'0');

    var sel = document.createElement('select');
    sel.className = 's-sel';
    C.forEach(function(c){
      var o = document.createElement('option');
      o.value = c.id; o.textContent = c.name;
      if(c.id===s.colorId) o.selected=true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', function(){ s.colorId=sel.value; drawResults(); });

    var gi = document.createElement('input');
    gi.className = 's-g'; gi.type='number'; gi.min='0'; gi.step='0.01';
    gi.value=s.grams; gi.placeholder='0.00';
    gi.addEventListener('input', function(){ s.grams=gi.value; drawResults(); refreshRunning(); });

    var rd = document.createElement('div');
    rd.className = 's-r';
    rd.textContent = run>0 ? run.toFixed(2) : '--';

    var ni = document.createElement('input');
    ni.className = 's-n'; ni.type='text'; ni.value=s.note; ni.placeholder='swatch, adjust...';
    ni.addEventListener('input', function(){ s.note=ni.value; });

    var db = document.createElement('button');
    db.className = 's-d'; db.textContent='x';
    db.addEventListener('click', function(){
      var did=s.id;
      S=S.filter(function(x){ return x.id!==did; });
      drawSteps(); drawResults();
    });

    row.appendChild(num); row.appendChild(sel); row.appendChild(gi);
    row.appendChild(rd); row.appendChild(ni); row.appendChild(db);
    el.appendChild(row);
  });
}

function refreshRunning() {
  var run=0, divs=document.querySelectorAll('.s-r');
  S.forEach(function(s,i){ run+=parseFloat(s.grams)||0; if(divs[i]) divs[i].textContent=run>0?run.toFixed(2):'--'; });
}

function refreshSelects() {
  document.querySelectorAll('.s-sel').forEach(function(sel,i){
    if(!S[i]) return;
    var cur=S[i].colorId; sel.innerHTML='';
    C.forEach(function(c){ var o=document.createElement('option'); o.value=c.id; o.textContent=c.name; if(c.id===cur) o.selected=true; sel.appendChild(o); });
  });
}

function drawResults() {
  var T=getTotals(), grand=0;
  Object.keys(T).forEach(function(k){ grand+=T[k]; });
  document.getElementById('totBadge').textContent = grand>0 ? grand.toFixed(2)+'g total' : '--';
  document.getElementById('recTag').textContent = activeRec ? ('-- '+activeRec.name) : '';

  var ra=document.getElementById('ratioArea'), sa=document.getElementById('scaledArea');
  var sv=parseFloat(document.getElementById('scaleIn').value)||0;
  ra.innerHTML='';
  if(grand===0){ ra.innerHTML='<div class="empty-st">Add steps above to calculate ratio</div>'; sa.innerHTML=''; return; }

  C.forEach(function(c){
    var g=T[c.id]||0, pct=grand>0?(g/grand*100):0;
    var rr=document.createElement('div'); rr.className='ratio-row';
    var dot=document.createElement('div'); dot.className='rdot'; dot.style.background=c.hex;
    var nm=document.createElement('div'); nm.className='rname'; nm.textContent=c.name;
    var pc=document.createElement('div'); pc.className='rpct'; pc.textContent=pct.toFixed(1)+'%';
    var gr=document.createElement('div'); gr.className='rgrams'; gr.textContent=g.toFixed(2)+'g';
    rr.appendChild(dot); rr.appendChild(nm); rr.appendChild(pc); rr.appendChild(gr);
    ra.appendChild(rr);
    var bw=document.createElement('div'); bw.className='bar-wrap';
    var sp=document.createElement('div'); sp.className='bar-sp';
    var bt=document.createElement('div'); bt.className='bar-track';
    var bf=document.createElement('div'); bf.className='bar-fill'; bf.style.width=pct+'%'; bf.style.background=c.hex;
    bt.appendChild(bf); bw.appendChild(sp); bw.appendChild(bt); ra.appendChild(bw);
  });

  sa.innerHTML='';
  if(sv>0){
    var u=UNITS[unit], sg=sv/u.factor;
    var sh=document.createElement('div'); sh.className='scaled-hdr'; sh.textContent='Scaled to '+sv+' '+u.label; sa.appendChild(sh);
    C.forEach(function(c){
      var pct=grand>0?(T[c.id]||0)/grand:0, val=(pct*sg*u.factor).toFixed(u.dec);
      var sr=document.createElement('div'); sr.className='sc-row';
      var dot=document.createElement('div'); dot.className='rdot'; dot.style.background=c.hex;
      var nm=document.createElement('div'); nm.className='rname'; nm.style.fontSize='0.9rem'; nm.textContent=c.name;
      var sv2=document.createElement('div'); sv2.className='sc-val'; sv2.textContent=val+' '+u.label;
      sr.appendChild(dot); sr.appendChild(nm); sr.appendChild(sv2); sa.appendChild(sr);
    });
    if(u.note){ var un=document.createElement('div'); un.className='unit-note'; un.textContent=u.note; sa.appendChild(un); }
  }
}

function drawAll() { drawColors(); drawSteps(); drawResults(); }

// Unit buttons
document.querySelectorAll('.ubtn').forEach(function(b){
  b.addEventListener('click', function(){
    unit=b.dataset.u;
    document.querySelectorAll('.ubtn').forEach(function(x){ x.className=x.dataset.u===unit?'ubtn on':'ubtn'; });
    drawResults();
  });
});
document.getElementById('scaleIn').addEventListener('input', drawResults);

// Add color
document.getElementById('addColorBtn').addEventListener('click', function(){
  var idx=C.length;
  C.push({id:uid(), name:'Color '+String.fromCharCode(65+idx), hex:PALETTE[idx%PALETTE.length]});
  drawAll();
});

// Add step
document.getElementById('addStepBtn').addEventListener('click', function(){
  S.push({id:uid(), colorId:C[0].id, grams:'', note:''});
  drawSteps(); drawResults();
  setTimeout(function(){ var gs=document.querySelectorAll('.s-g'); if(gs.length) gs[gs.length-1].focus(); },50);
});

// Copy
document.getElementById('copyBtn').addEventListener('click', function(){
  var T=getTotals(), grand=0; Object.keys(T).forEach(function(k){ grand+=T[k]; });
  if(grand===0){ toast('Nothing to copy'); return; }
  var lines=[];
  if(activeRec){ lines.push('Recipe: '+activeRec.name); lines.push('Saved: '+new Date(activeRec.savedAt).toLocaleDateString()); }
  else { lines.push('Date: '+new Date().toLocaleDateString()); }
  lines.push('');
  C.forEach(function(c){ lines.push(c.name+': '+((T[c.id]||0)/grand*100).toFixed(2)+'%'); });
  lines.push(''); lines.push('Total: '+grand.toFixed(2)+'g');
  try { navigator.clipboard.writeText(lines.join('\n')).then(function(){ toast('Copied!'); }); }
  catch(e){ toast('Copy failed'); }
});

// Reset
document.getElementById('resetBtn').addEventListener('click', function(){
  if(!confirm('Reset all?')) return;
  C=[{id:uid(),name:'Color A',hex:'#c0392b'},{id:uid(),name:'Color B',hex:'#2c7873'}];
  S=[{id:uid(),colorId:C[0].id,grams:'',note:''},{id:uid(),colorId:C[1].id,grams:'',note:''}];
  activeRec=null; document.getElementById('scaleIn').value=''; drawAll();
});

// Storage
function getRecipes(){ try{ return JSON.parse(localStorage.getItem('pr')||'[]'); }catch(e){ return []; } }
function putRecipes(r){ try{ localStorage.setItem('pr',JSON.stringify(r)); }catch(e){ toast('Storage error'); } }

function drawRecipes(){
  var recs=getRecipes().sort(function(a,b){ return b.savedAt-a.savedAt; });
  var el=document.getElementById('recList'), ct=document.getElementById('recCount');
  el.innerHTML='';
  if(recs.length===0){ ct.textContent='No saved recipes'; var e=document.createElement('div'); e.className='rec-empty'; e.textContent='Save a recipe to see it here'; el.appendChild(e); return; }
  ct.textContent=recs.length+' recipe'+(recs.length!==1?'s':'')+' saved';
  recs.forEach(function(rec){
    var item=document.createElement('div'); item.className='rec-item';
    var info=document.createElement('div'); info.className='rec-info';
    info.addEventListener('click', function(){ loadRec(rec.id); });
    var dots=document.createElement('div'); dots.className='rec-dots';
    rec.colors.forEach(function(c){ var d=document.createElement('div'); d.className='rec-dot'; d.style.background=c.hex; dots.appendChild(d); });
    var nm=document.createElement('div'); nm.className='rec-name'; nm.textContent=rec.name;
    var mt=document.createElement('div'); mt.className='rec-meta';
    var ns=rec.steps.filter(function(s){ return parseFloat(s.grams)>0; }).length;
    mt.textContent=ns+' steps ? '+new Date(rec.savedAt).toLocaleDateString();
    info.appendChild(dots); info.appendChild(nm); info.appendChild(mt);
    var del=document.createElement('button'); del.className='rec-del'; del.textContent='x';
    del.addEventListener('click', function(e){ e.stopPropagation(); if(!confirm('Delete?')) return; putRecipes(getRecipes().filter(function(r){ return r.id!==rec.id; })); drawRecipes(); });
    item.appendChild(info); item.appendChild(del); el.appendChild(item);
  });
}

function loadRec(id){
  var rec=getRecipes().filter(function(r){ return r.id===id; })[0];
  if(!rec){ toast('Not found'); return; }
  C=rec.colors; S=rec.steps; activeRec={name:rec.name,savedAt:rec.savedAt};
  document.getElementById('scaleIn').value=rec.scaleTarget||'';
  if(rec.unit&&UNITS[rec.unit]){ unit=rec.unit; document.querySelectorAll('.ubtn').forEach(function(b){ b.className=b.dataset.u===unit?'ubtn on':'ubtn'; }); }
  drawAll(); toast('Loaded: '+rec.name); window.scrollTo(0,0);
}

// Save modal
document.getElementById('saveBtn').addEventListener('click', function(){
  var T=getTotals(), g=0; Object.keys(T).forEach(function(k){ g+=T[k]; });
  if(g===0){ toast('Add steps first'); return; }
  document.getElementById('modalIn').value='';
  document.getElementById('modalBg').className='modal-bg open';
  setTimeout(function(){ document.getElementById('modalIn').focus(); },50);
});
function doSave(){
  var n=document.getElementById('modalIn').value.trim(); if(!n){ document.getElementById('modalIn').focus(); return; }
  document.getElementById('modalBg').className='modal-bg';
  var recs=getRecipes(), id=uid(), now=Date.now();
  recs.push({id:id,name:n,savedAt:now,colors:C.map(function(c){ return {id:c.id,name:c.name,hex:c.hex}; }),steps:S.map(function(s){ return {id:s.id,colorId:s.colorId,grams:s.grams,note:s.note}; }),scaleTarget:document.getElementById('scaleIn').value||'',unit:unit});
  putRecipes(recs); activeRec={name:n,savedAt:now}; drawRecipes(); drawResults(); toast('Saved: '+n);
}
document.getElementById('modalOk').addEventListener('click', doSave);
document.getElementById('modalCancel').addEventListener('click', function(){ document.getElementById('modalBg').className='modal-bg'; });
document.getElementById('modalIn').addEventListener('keydown', function(e){ if(e.key==='Enter') doSave(); if(e.key==='Escape') document.getElementById('modalBg').className='modal-bg'; });
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) this.className='modal-bg'; });

// Init
try {
  drawAll();
  drawRecipes();
  var cl = document.getElementById('colorList');
  var sl = document.getElementById('stepList');
  var d = document.getElementById('dbg');
  d.style.display = 'block';
  d.style.background = '#2c7873';
  d.textContent = 'Init OK | colorList children: ' + cl.children.length + ' | stepList children: ' + sl.children.length + ' | C:' + C.length + ' S:' + S.length;
} catch(e) {
  var d = document.getElementById('dbg');
  d.style.display = 'block';
  d.textContent = 'INIT ERROR: ' + e.message + '\n' + e.stack;
}
</script>
</body>
</html>
